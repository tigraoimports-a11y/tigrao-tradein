<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#E8740E" />
  <title>Offline — TigrãoImports</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0A;
      color: #F5F5F5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 380px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #E8740E;
    }
    p {
      font-size: 16px;
      line-height: 1.5;
      color: #888;
      margin-bottom: 32px;
    }
    .retry-btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #E8740E, #F5A623);
      color: #0A0A0A;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .retry-btn:hover { opacity: 0.9; }
    .retry-btn:active { opacity: 0.8; }
    .brand {
      margin-top: 48px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Você está offline</h1>
    <p>Sem conexão com a internet. Verifique sua rede e tente novamente.</p>
    <button class="retry-btn" onclick="window.location.reload()">Tentar novamente</button>
    <div class="brand">TigrãoImports 🐯</div>
  </div>
</body>
</html>
